name: Refresh Star History Cache Bust

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update cache-bust token
        run: |
          today="$(date -u +%Y%m%d)"
          perl -0pi -e "s#(https://api\\.star-history\\.com/svg\\?repos=petergpt/bullshit-benchmark&type=Date(?:&theme=dark)?)(?:&cachebust=\\d+)?#\$1&cachebust=$today#g" README.md

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh star history cache-bust"
          git push
